    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['DM Sans', 'sans-serif'],
              display: ['Outfit', 'sans-serif'], // Switched to Outfit for a more modern/geometric look
            },
            colors: {
              background: 'var(--bg-main)',
              surface: 'var(--bg-surface)',
              primary: '#000000', 
              'text-main': 'var(--text-main)',
              'text-muted': 'var(--text-muted)',
              secondary: '#525252',
              
              // NEW "LUMINOUS VOID" PALETTE
              // High Contrast, Neon, Premium
              'brand-blue': '#3b82f6',   // Electric Blue
              'brand-green': '#14b8a6',  // Cyber Teal (Replaces Green)
              'brand-orange': '#f43f5e', // Neon Rose (Replaces Orange)
            },
            backgroundImage: {
              'grid-pattern': "linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px)",
              'grid-pattern-dark': "linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px)",
            },
            animation: {
              'marquee': 'marquee 40s linear infinite',
              'marquee-reverse': 'marqueeReverse 40s linear infinite',
              'slide-up': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'gradient-xy': 'gradientXY 15s ease infinite',
              'float': 'float 8s ease-in-out infinite',
              'text-shimmer': 'textShimmer 2.5s ease-in-out infinite alternate',
              'spin-slow': 'spin 15s linear infinite',
              'spin-reverse': 'spinReverse 18s linear infinite',
              'egg-bounce': 'eggBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
              'nest-draw': 'nestDraw 1.2s ease-out forwards',
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
              'pop-in': 'popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'orbit': 'orbit 20s linear infinite',
              'pulse-glow': 'pulseGlow 4s ease-in-out infinite',
              'breathing': 'breathing 6s ease-in-out infinite',
            },
            keyframes: {
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              marqueeReverse: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(0%)' },
              },
              slideUp: {
                '0%': { transform: 'translateY(40px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              gradientXY: {
                '0%, 100%': { 'background-position': '0% 50%' },
                '50%': { 'background-position': '100% 50%' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              textShimmer: {
                '0%': { 'background-position': '0% 50%' },
                '100%': { 'background-position': '100% 50%' },
              },
              eggBounce: {
                '0%': { transform: 'scale(0) translateY(30px)', opacity: '0' },
                '60%': { transform: 'scale(1.1) translateY(-10px)', opacity: '1' },
                '100%': { transform: 'scale(1) translateY(0)', opacity: '1' },
              },
              nestDraw: {
                '0%': { strokeDashoffset: '200', opacity: '0' },
                '100%': { strokeDashoffset: '0', opacity: '1' },
              },
              fadeInUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              popIn: {
                '0%': { transform: 'scale(0.8)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              },
              orbit: {
                 '0%': { transform: 'rotate(0deg)' },
                 '100%': { transform: 'rotate(360deg)' },
              },
              spinReverse: {
                '0%': { transform: 'rotate(360deg)' },
                '100%': { transform: 'rotate(0deg)' },
              },
              pulseGlow: {
                '0%, 100%': { opacity: '0.4', transform: 'scale(1)' },
                '50%': { opacity: '0.7', transform: 'scale(1.1)' },
              },
              breathing: {
                '0%, 100%': { transform: 'scale(1)' },
                '50%': { transform: 'scale(1.05)' },
              }
            }
          },
        },
      };
    </script>

    <style>
      :root {
        /* Light Mode: Pure White & Sharp Contrast */
        --bg-main: #FFFFFF; 
        --bg-surface: #FAFAFA; /* Zinc 50 */
        --text-main: #000000; /* Pure Black */
        --text-muted: #525252; /* Zinc 600 */
      }
      .dark {
        /* Dark Mode: The Void (True Black) */
        --bg-main: #000000; /* Pure Black */
        --bg-surface: #09090b; /* Zinc 950 */
        --text-main: #FFFFFF; 
        --text-muted: #a1a1aa; /* Zinc 400 */
      }

      body {
        font-family: 'DM Sans', sans-serif;
        background-color: var(--bg-main);
        color: var(--text-main);
        overflow-x: hidden;
        transition: background-color 0.5s cubic-bezier(0.16, 1, 0.3, 1), color 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }

      h1, h2, h3, h4, h5, h6 {
        font-family: 'Outfit', sans-serif; /* New Modern Font */
      }
      
      /* Utilities */
      .text-stroke {
        -webkit-text-stroke: 1px rgba(9, 9, 11, 0.2);
        color: transparent;
      }
      .dark .text-stroke {
        -webkit-text-stroke: 1px rgba(255, 255, 255, 0.2);
      }

      .bg-grid {
        background-size: 50px 50px;
      }
      
      /* Hide scrollbar */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      * {
        text-rendering: optimizeSpeed;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Smooth transitions for interactive elements */
      a, button {
        transition: color 0.2s, background-color 0.2s, border-color 0.2s, opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      }

      /* Mobile-first touch optimization */
      @media (max-width: 768px) {
        .backdrop-blur-xl,
        .backdrop-blur-2xl,
        .backdrop-blur-3xl {
          backdrop-filter: blur(12px);
        }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes smoothFadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
