<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="arcGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <radialGradient id="coreGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#f97316" />
    </radialGradient>
  </defs>
  
  <!-- Outer Border Circle -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="#000000" stroke-width="2" />
  
  <!-- Central Core -->
  <circle cx="256" cy="256" r="90" fill="url(#coreGradient)" />
  
  <!-- Gradient Arc -->
  <path d="M280,110 A150,150 0 1,0 350,380" 
        fill="none" 
        stroke="url(#arcGradient)" 
        stroke-width="45" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Satellite Dot -->
  <circle cx="325" cy="410" r="22" fill="#FFFFFF" />
</svg>
